# 砖皮百科 · Nginx 配置
# 放到 /etc/nginx/sites-available/zpbk，然后 ln -s 到 sites-enabled/
#
# ⚠️ 替换所有 <你的域名> 和 /var/www/zpbk 为你的实际值

server {
    listen 80;
    server_name <你的域名>;

    # 将 HTTP 重定向到 HTTPS（配置好 SSL 后取消注释）
    # return 301 https://$host$request_uri;

    # ── 静态文件：网站根目录为仓库根 ──────────────────────
    root /var/www/zpbk;

    # 访问根路径时直接打开 site/index.html
    location = / {
        try_files /site/index.html =404;
    }

    # /site/ 路径下的 JS/CSS/图片等静态资源
    location /site/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 武器图片文件夹（ASVAL/ K416/ 等），供 site/ 通过 ../ 引用
    location ~* ^/(ASVAL|K416|QBZ95|腾龙|AUG|KC17|M4A1|SCARH|Vector)/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── 评论 API：反向代理到 Flask ────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5200;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;

        # 限制单 IP 请求速率，防止恶意刷接口
        limit_req zone=api_limit burst=10 nodelay;
    }
}

# 速率限制区（放在 http {} 块里，即此文件外层的 nginx.conf 中）
# 在 /etc/nginx/nginx.conf 的 http { } 内添加：
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;


